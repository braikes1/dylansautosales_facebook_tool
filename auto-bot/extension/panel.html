<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AutoBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-icon">
            <span class="logo-dot"></span>
          </div>
          <div class="brand-text-group">
            <span class="brand-name">AutoBot</span>
            <span class="brand-sub">Dylan's Auto Sales</span>
          </div>
        </div>
        <button id="scrapeBtn" class="primary">Scrape this page</button>
      </header>

      <main>
        <!-- RESULTS LIST -->
        <section id="view-list" class="view active">
          <div id="listEmpty" class="empty-state">
            <div class="empty-icon">🚗</div>
            <p>Click <strong>Scrape this page</strong> to detect vehicles.</p>
            <button id="batchTestBtn" class="batch-btn">🧪 Run Batch Test</button>
          </div>
          <div id="listGrid" class="card-grid"></div>
        </section>

        <!-- DETAIL VIEW -->
        <section id="view-detail" class="view">
          <button id="backToList" class="link-btn">← Back to results</button>

          <div id="detailLoading" class="loading-state">
            <div class="spinner"></div>
            <span>Extracting vehicle data…</span>
          </div>

          <div id="detailContent" hidden>
            <div class="detail-card">
              <div class="section-header">
                <span class="section-title">Listing Details</span>
              </div>

              <label class="field full">
                <span>Title</span>
                <input id="field-title" />
              </label>

              <div class="field-row three">
                <label class="field">
                  <span>Year</span>
                  <input id="field-year" />
                </label>
                <label class="field">
                  <span>Make</span>
                  <input id="field-make" />
                </label>
                <label class="field">
                  <span>Model</span>
                  <input id="field-model" />
                </label>
              </div>

              <div class="field-row two">
                <label class="field">
                  <span>Price</span>
                  <input id="field-price" />
                </label>
                <label class="field">
                  <span>Mileage</span>
                  <input id="field-mileage" />
                </label>
              </div>

              <div class="field-row two">
                <label class="field">
                  <span>VIN</span>
                  <input id="field-vin" />
                </label>
                <label class="field">
                  <span>Body Type</span>
                  <input id="field-bodyType" />
                </label>
              </div>

              <div class="field-row two">
                <label class="field">
                  <span>Exterior Color</span>
                  <input id="field-extColor" />
                </label>
                <label class="field">
                  <span>Interior Color</span>
                  <input id="field-intColor" />
                </label>
              </div>

              <label class="field full">
                <span>Description</span>
                <textarea id="field-description" rows="4"></textarea>
              </label>
            </div>

            <div class="detail-card">
              <div class="section-header">
                <span class="section-title">Photos</span>
                <div class="photos-header-right">
                  <span id="photosCount" class="photo-badge"></span>
                  <label class="scrub-toggle" title="Remove dealer watermarks from photos">
                    <input type="checkbox" id="scrubToggle" />
                    <span class="scrub-track">
                      <span class="scrub-thumb"></span>
                    </span>
                    <span class="scrub-label">Scrub</span>
                  </label>
                </div>
              </div>
              <div id="scrubStatus" class="scrub-status" hidden></div>
              <div id="photosGrid" class="photos-grid"></div>
              <p class="photo-hint">Tap a photo to remove it from the listing.</p>
            </div>

            <div class="detail-actions">
              <button id="btnSendFacebook" class="primary wide">
                Send to Facebook Marketplace
              </button>
            </div>
          </div>
        </section>

        <!-- BATCH TEST VIEW -->
        <section id="view-batch" class="view">
          <button id="backFromBatch" class="link-btn">← Back</button>
          <div class="detail-card">
            <div class="section-header">
              <span class="section-title">Batch Test</span>
              <span id="batchProgress" class="photo-badge"></span>
            </div>
            <div id="batchStatus" class="batch-status"></div>
            <div id="batchResults" class="batch-results"></div>
            <div class="detail-actions" id="batchActions">
              <button id="startBatchBtn" class="primary wide">▶ Start Test (38 dealers)</button>
              <button id="downloadCsvBtn" class="wide" hidden>⬇ Download CSV Report</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="panel.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostBot — Create Account</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #A41414;
      --red-dark:   #7e0f0f;
      --red-light:  #f7e8e8;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-500:   #6b7280;
      --gray-700:   #374151;
      --gray-900:   #111827;
      --white:      #ffffff;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:  0 4px 16px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
      --shadow-lg:  0 12px 40px rgba(0,0,0,.13), 0 4px 12px rgba(0,0,0,.07);
      --radius:     12px;
      --transition: 160ms cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(164,20,20,.07) 0%, transparent 70%),
        var(--gray-50);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    /* ── Card Header ── */
    .card-header {
      background: var(--red);
      padding: 32px 36px 28px;
      position: relative;
      overflow: hidden;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 22px; height: 22px;
      fill: none; stroke: #fff; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -.3px;
    }

    .brand-sub {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,.65);
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-headline {
      font-size: 17px;
      font-weight: 500;
      color: rgba(255,255,255,.9);
      line-height: 1.4;
    }

    /* ── Card Body ── */
    .card-body {
      padding: 32px 36px 36px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
      letter-spacing: .1px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--gray-400);
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 46px;
      padding: 0 14px 0 40px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 15px;
      color: var(--gray-900);
      background: var(--white);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(164,20,20,.12);
    }

    input::placeholder { color: var(--gray-400); }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--gray-400);
      padding: 2px; line-height: 0;
      transition: color var(--transition);
    }
    .pw-toggle:hover { color: var(--gray-700); }
    .pw-toggle svg { width: 17px; height: 17px; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%;
      height: 48px;
      margin-top: 8px;
      background: var(--red);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .1px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 2px 6px rgba(164,20,20,.30);
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--red-dark);
      box-shadow: 0 4px 12px rgba(164,20,20,.35);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn-submit:disabled {
      opacity: .75;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { opacity: .85; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status messages ── */
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }

    .status.visible { display: flex; }

    .status-icon { flex-shrink: 0; margin-top: 1px; }
    .status-icon svg { width: 18px; height: 18px; }

    .status.success {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      color: #14532d;
    }

    .status.error {
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      color: #7f1d1d;
    }

    .status-title {
      font-weight: 600;
      font-size: 14px;
    }

    .status-body {
      font-size: 13px;
      margin-top: 2px;
      opacity: .85;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 18px 36px 24px;
      border-top: 1px solid var(--gray-100);
      text-align: center;
      font-size: 13px;
      color: var(--gray-500);
    }

    .card-footer a {
      color: var(--red);
      text-decoration: none;
      font-weight: 500;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ── Page footer ── */
    .page-footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--gray-400);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card-header, .card-body, .card-footer { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

  <div class="card" role="main">

    <!-- Header -->
    <div class="card-header">
      <div class="brand-lockup">
        <div class="brand-icon" aria-hidden="true">
          <!-- Car/post icon -->
          <svg viewBox="0 0 24 24">
            <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
            <rect x="9" y="11" width="14" height="10" rx="2"/>
            <circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">PostBot</div>
          <div class="brand-sub">Dylan's Auto Sales</div>
        </div>
      </div>
      <div class="header-headline">Create your account to start listing vehicles on Facebook Marketplace.</div>
    </div>

    <!-- Form -->
    <div class="card-body">
      <form id="signupForm" novalidate>

        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@dealership.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Minimum 8 characters"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
              <!-- Eye icon (show) -->
              <svg id="eyeShow" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hide) — hidden by default -->
              <svg id="eyeHide" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"
                   stroke-linecap: round; stroke-linejoin="round"
                   style="display:none">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-label">Create account</span>
        </button>

        <!-- Status message -->
        <div class="status" id="statusMsg" role="alert" aria-live="polite">
          <div class="status-icon" id="statusIcon"></div>
          <div>
            <div class="status-title" id="statusTitle"></div>
            <div class="status-body" id="statusBody"></div>
          </div>
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      Already have an account? <a href="#">Sign in</a>
    </div>

  </div>

  <div class="page-footer">
    &copy; 2026 Dylan's Auto Sales &nbsp;·&nbsp; PostBot
  </div>

  <script>
    const API = 'https://dylansautosales-facebook-tool.onrender.com';

    const form      = document.getElementById('signupForm');
    const emailEl   = document.getElementById('email');
    const pwEl      = document.getElementById('password');
    const btn       = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    const statusTitle = document.getElementById('statusTitle');
    const statusBody  = document.getElementById('statusBody');
    const statusIcon  = document.getElementById('statusIcon');

    // ── Password visibility toggle ──
    const pwToggle = document.getElementById('pwToggle');
    const eyeShow  = document.getElementById('eyeShow');
    const eyeHide  = document.getElementById('eyeHide');

    pwToggle.addEventListener('click', () => {
      const isHidden = pwEl.type === 'password';
      pwEl.type = isHidden ? 'text' : 'password';
      eyeShow.style.display = isHidden ? 'none'  : '';
      eyeHide.style.display = isHidden ? ''      : 'none';
      pwToggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    // ── Status helpers ──
    function showStatus(type, title, body) {
      statusMsg.className = `status ${type} visible`;
      statusTitle.textContent = title;
      statusBody.textContent  = body;

      const isSuccess = type === 'success';
      statusIcon.innerHTML = isSuccess
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
             <path d="M20 6 9 17l-5-5"/>
           </svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
             <circle cx="12" cy="12" r="10"/>
             <line x1="12" y1="8" x2="12" y2="12"/>
             <line x1="12" y1="16" x2="12.01" y2="16"/>
           </svg>`;
    }

    function clearStatus() {
      statusMsg.className = 'status';
      statusTitle.textContent = '';
      statusBody.textContent  = '';
    }

    function setLoading(on) {
      btn.disabled = on;
      btn.classList.toggle('loading', on);
    }

    // ── Submit ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus();

      const email    = emailEl.value.trim();
      const password = pwEl.value;

      // Basic client-side validation
      if (!email || !email.includes('@')) {
        showStatus('error', 'Invalid email', 'Please enter a valid email address.');
        emailEl.focus();
        return;
      }
      if (password.length < 8) {
        showStatus('error', 'Password too short', 'Password must be at least 8 characters.');
        pwEl.focus();
        return;
      }

      setLoading(true);

      try {
        const resp = await fetch(`${API}/auth/register`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });

        let data;
        try { data = await resp.json(); } catch { data = {}; }

        if (resp.ok && data.token) {
          // Success
          form.reset();
          showStatus(
            'success',
            'Account created — welcome to PostBot.',
            `You're signed up as ${email}. You can now use PostBot to list vehicles on Facebook Marketplace.`
          );
          btn.style.display = 'none'; // hide button after success
        } else {
          // API-level error (e.g. 400 duplicate)
          const msg = data.detail || `Server returned ${resp.status}.`;
          showStatus('error', 'Signup failed', msg);
        }

      } catch (err) {
        // Network error / server cold-starting
        showStatus(
          'error',
          'Could not reach PostBot',
          'The server may be waking up (this can take ~20 seconds). Please try again.'
        );
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
